<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SMLT · Super Mega List Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 1.5rem;
            min-height: 100vh;
        }
        :root {
            --bg-primary: #0a0c12;
            --bg-secondary: #10131c;
            --card-bg: #151824;
            --card-border: #2d2f3e;
            --text-primary: #f0f3fa;
            --text-secondary: #9ca3af;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.5);
            --accent-gradient: linear-gradient(135deg, #10b981, #059669);
            --danger: #ef4444;
            --button-bg: #1e1f2c;
            --input-bg: #20222e;
        }
        body.light {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent: #059669;
            --accent-glow: rgba(5, 150, 105, 0.3);
            --button-bg: #e5e7eb;
            --input-bg: #f9fafb;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent);
        }
        .logo h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .theme-toggle {
            background: var(--button-bg);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            color: var(--text-primary);
        }
        .nav-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .nav-btn {
            background: var(--button-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
        }
        .nav-btn.active { background: var(--accent-gradient); border-color: var(--accent); }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--button-bg);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--card-border);
        }
        .user-name-clickable { cursor: pointer; font-weight: 600; padding: 4px 8px; border-radius: 20px; }
        .user-name-clickable:hover { background: var(--accent); color: white; }
        .btn-outline {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-sm {
            background: var(--button-bg);
            padding: 6px 12px;
            border-radius: 30px;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
        }
        .btn-primary { background: var(--accent-gradient); color: white; border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; }
        .panel { display: none; }
        .panel.active-panel { display: block; }

        /* ДВУХКОЛОНОЧНЫЙ ДАШБОРД */
        .dashboard-split {
            display: flex;
            gap: 1.8rem;
        }
        .levels-column {
            flex: 1.2;
            min-width: 0;
        }
        .right-column {
            flex: 0.9;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .card h3 { margin-bottom: 1rem; font-family: 'Orbitron', monospace; }

        .levels-grid-compact {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 6px;
        }
        .level-row {
            background: var(--bg-secondary);
            border-radius: 18px;
            padding: 0.8rem 1.2rem;
            border-left: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .level-info { display: flex; align-items: center; gap: 12px; }
        .level-pos { font-weight: 700; color: var(--accent); width: 30px; }

        .top-players-table { width: 100%; border-collapse: collapse; }
        .top-players-table th { text-align: left; padding-bottom: 8px; color: var(--text-secondary); }
        .top-players-table td { padding: 8px 0; border-bottom: 1px solid var(--card-border); }
        .player-link { color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

        .recent-list { display: flex; flex-direction: column; gap: 10px; }
        .recent-item {
            background: var(--bg-secondary);
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg); border-radius: 40px; padding: 2rem;
            width: 90%; max-width: 500px; border: 2px solid var(--accent);
            max-height: 80vh; overflow-y: auto;
        }
        .hidden { display: none; }
        .tabs-small { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tab-small { background: var(--button-bg); padding: 6px 16px; border-radius: 30px; cursor: pointer; border: none; color: var(--text-primary); }
        .tab-small.active { background: var(--accent); color: white; }
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group select, .form-group textarea {
            background: var(--input-bg); border: 1px solid var(--card-border);
            padding: 10px 14px; border-radius: 24px; width: 100%; color: var(--text-primary);
        }
        .badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; margin-left: 8px; }
        .admin-panel { margin-top: 2rem; border-top: 1px dashed var(--card-border); padding-top: 1rem; }
        @media (max-width: 900px) { .dashboard-split { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1><i class="fas fa-dragon"></i> SMLT</h1></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
            <div class="nav-buttons">
                <button class="nav-btn active" data-page="levels"><i class="fas fa-list"></i> Лист</button>
                <button class="nav-btn" data-page="profile"><i class="fas fa-user"></i> Профиль</button>
            </div>
            <div class="user-info" id="userInfo">
                <span id="userNameDisplay" class="user-name-clickable">Гость</span>
                <button id="authBtn" class="btn-outline">Вход</button>
            </div>
        </div>
    </div>

    <!-- ГЛАВНАЯ (ЛИСТ) -->
    <div id="levelsPage" class="panel active-panel">
        <div class="dashboard-split">
            <div class="levels-column">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3><i class="fas fa-dragon"></i> Демонлист</h3>
                        <button id="addLevelBtn" class="btn-sm btn-primary" style="display: none;"><i class="fas fa-plus"></i> Добавить</button>
                    </div>
                    <div id="levelsListCompact" class="levels-grid-compact">Нет уровней</div>
                </div>
            </div>
            <div class="right-column">
                <div class="card">
                    <h3><i class="fas fa-trophy"></i> Топ игроков</h3>
                    <table class="top-players-table" id="topPlayersTable">
                        <thead><tr><th>#</th><th>Игрок</th><th>Очки</th></tr></thead>
                        <tbody id="topPlayersBody"></tbody>
                    </table>
                </div>
                <div class="card">
                    <h3><i class="fas fa-clock"></i> Последние рекорды</h3>
                    <div id="recentRecordsList" class="recent-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profilePage" class="panel">
        <div class="card" id="profileView"></div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ВХОДА / РЕГИСТРАЦИИ -->
<div id="authModal" class="modal hidden">
    <div class="modal-content">
        <h2>Вход / Регистрация</h2>
        <div class="tabs-small">
            <button class="tab-small active" data-auth-tab="login">Вход</button>
            <button class="tab-small" data-auth-tab="register">Регистрация</button>
        </div>
        <div id="loginForm">
            <div class="form-group"><input type="text" id="loginUsername" placeholder="Логин"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
            <div id="loginError" style="color:var(--danger);"></div>
            <button id="doLogin" class="btn-primary" style="width:100%;">Войти</button>
        </div>
        <div id="registerForm" class="hidden">
            <div class="form-group"><input type="text" id="regUsername" placeholder="Логин"></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div id="regError" style="color:var(--danger);"></div>
            <button id="doRegister" class="btn-primary" style="width:100%;">Зарегистрироваться</button>
        </div>
        <button id="closeAuthModal" style="margin-top:1rem; background:none; border:none; color:var(--text-secondary);">Отмена</button>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ / РЕДАКТИРОВАНИЯ УРОВНЯ (АДМИН) -->
<div id="levelModal" class="modal hidden">
    <div class="modal-content">
        <h3 id="levelModalTitle">Добавить уровень</h3>
        <input type="hidden" id="levelEditId">
        <div class="form-group"><input type="text" id="levelName" placeholder="Название"></div>
        <div class="form-group"><input type="text" id="levelAuthor" placeholder="Автор"></div>
        <div class="form-group"><input type="number" id="levelPosition" placeholder="Позиция (число)"></div>
        <button id="saveLevelBtn" class="btn-primary" style="width:100%;">Сохранить</button>
        <button id="closeLevelModal" style="margin-top:0.5rem;">Отмена</button>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ИГРОКА (АДМИН) -->
<div id="playerModal" class="modal hidden">
    <div class="modal-content">
        <h3>Редактировать игрока</h3>
        <input type="hidden" id="playerEditId">
        <div class="form-group"><input type="text" id="playerUsername" placeholder="Логин"></div>
        <div class="form-group"><input type="text" id="playerGdlNick" placeholder="GDL ник"></div>
        <div class="form-group">
            <label>Роль</label>
            <select id="playerRole">
                <option value="user">Пользователь</option>
                <option value="moderator">Модератор</option>
                <option value="admin">Администратор</option>
            </select>
        </div>
        <button id="savePlayerBtn" class="btn-primary" style="width:100%;">Сохранить</button>
        <button id="closePlayerModal" style="margin-top:0.5rem;">Отмена</button>
    </div>
</div>

<script>
    (function(){
        // ---------- ДАННЫЕ ----------
        let users = [];            // { id, username, password, gdlNick, role, logs }
        let levels = [];           // { id, name, position, author }
        let records = [];          // { id, userId, levelId, percent, videoLink, status, timestamp }
        let currentUser = null;

        const ADMIN = { id: 'admin', username: 'admin', password: 'admin123', gdlNick: 'Admin', role: 'admin', logs: [] };

        // ---------- ФОРМУЛА ОЧКОВ P(h) ----------
        function getLevelPoints(position, totalLevels) {
            const h = position;
            if (h >= 1 && h <= 8) return 1040 - 40 * h;
            if (h > 8 && h <= 10) return 1200 - 60 * h;
            if (h > 10 && h <= 20) return 800 - 20 * h;
            if (h > 20 && h <= 50) return 480 - 4 * h;
            if (h > 50 && h <= 75) return 480 - 8 * h;
            if (h > 75 && h <= 150) return 155 - h;
            if (h > 150 && h <= 250) return 5 - 0.4 * Math.floor((h - 150) / 10);
            if (h > 250) {
                const H = totalLevels || 300;
                return Math.max(0.05, 1 - 0.01 * (95 * (h - 250) / (H - 250)));
            }
            return 0;
        }

        function calculateUserPoints(userId) {
            const userRecords = records.filter(r => r.userId === userId && r.status === 'approved');
            return userRecords.reduce((sum, rec) => {
                const level = levels.find(l => l.id === rec.levelId);
                return sum + (level ? getLevelPoints(level.position, levels.length) : 0);
            }, 0);
        }

        function getRankedPlayers() {
            return users
                .filter(u => u.id !== ADMIN.id)
                .map(u => ({ ...u, points: calculateUserPoints(u.id) }))
                .filter(u => u.points > 0)
                .sort((a, b) => b.points - a.points);
        }

        // ---------- СОХРАНЕНИЕ / ЗАГРУЗКА ----------
        function saveData() {
            localStorage.setItem('smlt_users', JSON.stringify(users.filter(u => u.id !== ADMIN.id)));
            localStorage.setItem('smlt_levels', JSON.stringify(levels));
            localStorage.setItem('smlt_records', JSON.stringify(records));
        }
        function loadData() {
            const storedUsers = JSON.parse(localStorage.getItem('smlt_users') || '[]');
            users = [ADMIN, ...storedUsers];
            levels = JSON.parse(localStorage.getItem('smlt_levels') || '[]');
            records = JSON.parse(localStorage.getItem('smlt_records') || '[]');
            
            if (levels.length === 0) {
                levels = [
                    { id: 'l1', name: 'Acheron', position: 1, author: 'ryamu' },
                    { id: 'l2', name: 'Silent clubstep', position: 2, author: 'TheRealSailent' },
                    { id: 'l3', name: 'Abyss of Darkness', position: 3, author: 'Exen' },
                ];
                saveData();
            }

            const sess = sessionStorage.getItem('smlt_currentUser');
            if (sess) {
                currentUser = JSON.parse(sess);
                const fresh = users.find(u => u.id === currentUser.id);
                if (fresh) currentUser = fresh;
            }
        }

        // ---------- РЕНДЕР ДАШБОРДА ----------
        function renderDashboard() {
            // Уровни
            const cont = document.getElementById('levelsListCompact');
            const sorted = [...levels].sort((a,b) => a.position - b.position);
            cont.innerHTML = sorted.length ? sorted.map(lvl => `
                <div class="level-row">
                    <div class="level-info"><span class="level-pos">#${lvl.position}</span> <span>${escapeHtml(lvl.name)} — ${escapeHtml(lvl.author)}</span></div>
                    <div>
                        ${currentUser?.role === 'admin' ? `<button class="btn-sm" onclick="window.editLevel('${lvl.id}')"><i class="fas fa-edit"></i></button>` : ''}
                    </div>
                </div>
            `).join('') : 'Нет уровней';

            // Топ игроков
            const ranked = getRankedPlayers().slice(0,10);
            document.getElementById('topPlayersBody').innerHTML = ranked.map((p, idx) => `
                <tr>
                    <td>${idx+1}</td>
                    <td><span class="player-link" onclick="window.showPlayerProfile('${p.id}')">${escapeHtml(p.username)}</span></td>
                    <td>${p.points.toFixed(2)}</td>
                </tr>
            `).join('') || '<tr><td colspan="3">Нет игроков</td></tr>';

            // Последние рекорды
            const recent = records.filter(r => r.status === 'approved').sort((a,b) => b.timestamp - a.timestamp).slice(0,5);
            document.getElementById('recentRecordsList').innerHTML = recent.map(r => {
                const u = users.find(x => x.id === r.userId);
                const l = levels.find(x => x.id === r.levelId);
                return `<div class="recent-item"><strong>${escapeHtml(u?.username || '?')}</strong> прошёл ${escapeHtml(l?.name || '?')} <a href="${r.videoLink}" target="_blank">🎥</a></div>`;
            }).join('') || '<div>Нет рекордов</div>';

            toggleAdminUI();
        }

        function toggleAdminUI() {
            const addBtn = document.getElementById('addLevelBtn');
            if (currentUser?.role === 'admin') addBtn.style.display = 'block';
            else addBtn.style.display = 'none';
        }

        // ---------- ПРОФИЛЬ ----------
        window.showPlayerProfile = (userId) => {
            const player = users.find(u => u.id === userId);
            if (!player) return;
            const isOwnProfile = currentUser && currentUser.id === userId;
            const rank = getRankedPlayers().findIndex(p => p.id === userId) + 1;
            const points = calculateUserPoints(userId);
            
            const userRecords = records.filter(r => r.userId === userId && r.status === 'approved');
            const completedLevels = userRecords.map(r => levels.find(l => l.id === r.levelId)).filter(l => l);
            const main = completedLevels.filter(l => l.position <= 75);
            const extended = completedLevels.filter(l => l.position > 75 && l.position <= 150);
            const advanced = completedLevels.filter(l => l.position > 150 && l.position <= 300);
            const unbounded = completedLevels.filter(l => l.position > 300);
            const hardest = completedLevels.length ? completedLevels.reduce((a,b) => a.position < b.position ? a : b) : null;

            const profileDiv = document.getElementById('profileContent');
            let html = `
                <h2>${escapeHtml(player.username)} ${player.role === 'admin' ? '<span class="badge">ADMIN</span>' : ''}</h2>
                <div class="profile-header" style="display:flex; gap:2rem; margin-bottom:2rem;">
                    <div class="profile-stats" style="display:flex; gap:2rem;">
                        <div class="stat-box"><strong>#${rank || '-'}</strong><br>Место</div>
                        <div class="stat-box"><strong>${points.toFixed(2)}</strong><br>Баллы</div>
                    </div>
                </div>
                ${hardest ? `<div style="margin: 1rem 0;"><i class="fas fa-skull"></i> Сложнейший уровень: <strong>${escapeHtml(hardest.name)}</strong> (#${hardest.position})</div>` : ''}
                <div class="category-section"><div class="category-title">Main List (#1-75) <span class="badge">${main.length}</span></div><div class="demon-list" style="display:flex; flex-wrap:wrap; gap:6px;">${main.map(l => `<span class="demon-badge" style="background:var(--button-bg); padding:4px 12px; border-radius:30px;">${escapeHtml(l.name)}</span>`).join('') || '—'}</div></div>
                <div class="category-section"><div class="category-title">Extended List (#76-150) <span class="badge">${extended.length}</span></div><div class="demon-list" style="display:flex; flex-wrap:wrap; gap:6px;">${extended.map(l => `<span class="demon-badge" style="background:var(--button-bg); padding:4px 12px; border-radius:30px;">${escapeHtml(l.name)}</span>`).join('') || '—'}</div></div>
                <div class="category-section"><div class="category-title">Advanced List (#151-300) <span class="badge">${advanced.length}</span></div><div class="demon-list" style="display:flex; flex-wrap:wrap; gap:6px;">${advanced.map(l => `<span class="demon-badge" style="background:var(--button-bg); padding:4px 12px; border-radius:30px;">${escapeHtml(l.name)}</span>`).join('') || '—'}</div></div>
                <div class="category-section"><div class="category-title">Unbounded List (#301+) <span class="badge">${unbounded.length}</span></div><div class="demon-list" style="display:flex; flex-wrap:wrap; gap:6px;">${unbounded.map(l => `<span class="demon-badge" style="background:var(--button-bg); padding:4px 12px; border-radius:30px;">${escapeHtml(l.name)}</span>`).join('') || '—'}</div></div>
            `;

            if (isOwnProfile) {
                html += `<hr style="margin: 2rem 0 1rem;"><h3>Настройки аккаунта</h3>
                    <div class="form-group"><label>GDL ник</label><input id="editGdlNick" value="${escapeHtml(currentUser.gdlNick || '')}" placeholder="Ваш ник в GD"></div>
                    <button class="btn-primary" onclick="window.saveProfileSettings()">Сохранить</button>
                `;
            }

            // Админ-панель управления игроками
            if (currentUser?.role === 'admin' && !isOwnProfile) {
                html += `<div class="admin-panel"><button class="btn-outline" onclick="window.editPlayer('${player.id}')"><i class="fas fa-user-edit"></i> Редактировать игрока</button></div>`;
            } else if (currentUser?.role === 'admin' && isOwnProfile) {
                html += `<div class="admin-panel"><h4>Администрирование</h4><button class="btn-outline" onclick="window.showAllPlayers()">Управление игроками</button></div>`;
            }

            profileDiv.innerHTML = html;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById('profilePage').classList.add('active-panel');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-page="profile"]').classList.add('active');
        };

        window.saveProfileSettings = () => {
            if (!currentUser) return;
            const gdlNick = document.getElementById('editGdlNick').value.trim();
            const user = users.find(u => u.id === currentUser.id);
            if (user) {
                user.gdlNick = gdlNick;
                currentUser.gdlNick = gdlNick;
                sessionStorage.setItem('smlt_currentUser', JSON.stringify(currentUser));
                saveData();
                showPlayerProfile(currentUser.id);
                updateUI();
                renderDashboard();
            }
        };

        // ---------- АДМИН: УРОВНИ ----------
        window.editLevel = (levelId) => {
            const level = levels.find(l => l.id === levelId);
            if (!level) return;
            document.getElementById('levelModalTitle').innerText = 'Редактировать уровень';
            document.getElementById('levelEditId').value = levelId;
            document.getElementById('levelName').value = level.name;
            document.getElementById('levelAuthor').value = level.author;
            document.getElementById('levelPosition').value = level.position;
            document.getElementById('levelModal').classList.remove('hidden');
        };
        document.getElementById('addLevelBtn').onclick = () => {
            document.getElementById('levelModalTitle').innerText = 'Добавить уровень';
            document.getElementById('levelEditId').value = '';
            document.getElementById('levelName').value = '';
            document.getElementById('levelAuthor').value = '';
            document.getElementById('levelPosition').value = levels.length + 1;
            document.getElementById('levelModal').classList.remove('hidden');
        };
        document.getElementById('saveLevelBtn').onclick = () => {
            const id = document.getElementById('levelEditId').value;
            const name = document.getElementById('levelName').value.trim();
            const author = document.getElementById('levelAuthor').value.trim();
            const pos = parseInt(document.getElementById('levelPosition').value);
            if (!name || !author || isNaN(pos)) return alert('Заполните все поля');
            
            if (id) {
                const level = levels.find(l => l.id === id);
                if (level) { level.name = name; level.author = author; level.position = pos; }
            } else {
                levels.push({ id: 'lvl_'+Date.now(), name, author, position: pos });
            }
            saveData();
            document.getElementById('levelModal').classList.add('hidden');
            renderDashboard();
        };
        document.getElementById('closeLevelModal').onclick = () => document.getElementById('levelModal').classList.add('hidden');

        // ---------- АДМИН: ИГРОКИ ----------
        window.editPlayer = (userId) => {
            const player = users.find(u => u.id === userId);
            if (!player) return;
            document.getElementById('playerEditId').value = userId;
            document.getElementById('playerUsername').value = player.username;
            document.getElementById('playerGdlNick').value = player.gdlNick || '';
            document.getElementById('playerRole').value = player.role;
            document.getElementById('playerModal').classList.remove('hidden');
        };
        window.showAllPlayers = () => {
            const list = users.filter(u => u.id !== ADMIN.id).map(u => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${escapeHtml(u.username)} (${u.role})</span> <button class="btn-sm" onclick="window.editPlayer('${u.id}')">✏️</button></div>`).join('');
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><h3>Все игроки</h3>${list}<button onclick="this.closest('.modal').remove()" style="margin-top:1rem;">Закрыть</button></div>`;
            document.body.appendChild(modal);
        };
        document.getElementById('savePlayerBtn').onclick = () => {
            const id = document.getElementById('playerEditId').value;
            const username = document.getElementById('playerUsername').value.trim();
            const gdlNick = document.getElementById('playerGdlNick').value.trim();
            const role = document.getElementById('playerRole').value;
            const player = users.find(u => u.id === id);
            if (player) {
                player.username = username;
                player.gdlNick = gdlNick;
                player.role = role;
                saveData();
                if (currentUser.id === id) {
                    currentUser = { ...player, password: undefined };
                    sessionStorage.setItem('smlt_currentUser', JSON.stringify(currentUser));
                }
            }
            document.getElementById('playerModal').classList.add('hidden');
            renderDashboard();
            updateUI();
        };
        document.getElementById('closePlayerModal').onclick = () => document.getElementById('playerModal').classList.add('hidden');

        // ---------- АВТОРИЗАЦИЯ ----------
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function login(username, password) {
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) return { error: 'Неверный логин или пароль' };
            currentUser = { ...user, password: undefined };
            sessionStorage.setItem('smlt_currentUser', JSON.stringify(currentUser));
            return { success: true };
        }
        function register(username, password) {
            if (users.some(u => u.username === username)) return { error: 'Логин занят' };
            const newUser = { id: 'u_'+Date.now(), username, password, gdlNick: '', role: 'user', logs: [] };
            users.push(newUser);
            saveData();
            currentUser = { ...newUser, password: undefined };
            sessionStorage.setItem('smlt_currentUser', JSON.stringify(currentUser));
            return { success: true };
        }
        function logout() {
            currentUser = null;
            sessionStorage.removeItem('smlt_currentUser');
            updateUI();
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById('levelsPage').classList.add('active-panel');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-page="levels"]').classList.add('active');
            renderDashboard();
        }
        function updateUI() {
            const span = document.getElementById('userNameDisplay');
            const btn = document.getElementById('authBtn');
            if (currentUser) {
                span.innerText = currentUser.username;
                btn.innerText = 'Выйти';
                btn.onclick = logout;
            } else {
                span.innerText = 'Гость';
                btn.innerText = 'Вход';
                btn.onclick = openAuthModal;
            }
        }

        function escapeHtml(t) { return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            loadData();
            renderDashboard();
            updateUI();

            // Навигация
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
                    document.getElementById(page + 'Page').classList.add('active-panel');
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (page === 'profile' && currentUser) showPlayerProfile(currentUser.id);
                    else if (page === 'profile' && !currentUser) openAuthModal();
                    if (page === 'levels') renderDashboard();
                });
            });
            document.getElementById('userNameDisplay').onclick = () => {
                if (currentUser) showPlayerProfile(currentUser.id);
                else openAuthModal();
            };

            // Модалка авторизации
            document.querySelector('[data-auth-tab="login"]').onclick = () => {
                document.querySelectorAll('[data-auth-tab]').forEach(t => t.classList.remove('active'));
                document.querySelector('[data-auth-tab="login"]').classList.add('active');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            };
            document.querySelector('[data-auth-tab="register"]').onclick = () => {
                document.querySelectorAll('[data-auth-tab]').forEach(t => t.classList.remove('active'));
                document.querySelector('[data-auth-tab="register"]').classList.add('active');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('loginForm').classList.add('hidden');
            };
            document.getElementById('doLogin').onclick = () => {
                const u = document.getElementById('loginUsername').value.trim();
                const p = document.getElementById('loginPassword').value;
                const res = login(u, p);
                if (res.success) {
                    document.getElementById('authModal').classList.add('hidden');
                    updateUI();
                    renderDashboard();
                    showPlayerProfile(currentUser.id);
                } else {
                    document.getElementById('loginError').innerText = res.error;
                }
            };
            document.getElementById('doRegister').onclick = () => {
                const u = document.getElementById('regUsername').value.trim();
                const p = document.getElementById('regPassword').value;
                if (!u || !p) { document.getElementById('regError').innerText = 'Заполните поля'; return; }
                const res = register(u, p);
                if (res.success) {
                    document.getElementById('authModal').classList.add('hidden');
                    updateUI();
                    renderDashboard();
                    showPlayerProfile(currentUser.id);
                } else {
                    document.getElementById('regError').innerText = res.error;
                }
            };
            document.getElementById('closeAuthModal').onclick = () => document.getElementById('authModal').classList.add('hidden');

            // Тема
            const themeToggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('smlt_theme');
            if (savedTheme === 'light') document.body.classList.add('light');
            themeToggle.onclick = () => {
                document.body.classList.toggle('light');
                localStorage.setItem('smlt_theme', document.body.classList.contains('light') ? 'light' : 'dark');
            };

            window.showPlayerProfile = showPlayerProfile;
        }

        init();
    })();
</script>
</body>
</html>
